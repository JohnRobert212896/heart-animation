<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heart For My Crush</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
    font-family:'Poppins',sans-serif;
}

.heart{
    position:relative;
    width:120px;
    height:120px;
    background:#ff3366;
    transform:rotate(-45deg);
    animation:heartbeat 1.2s infinite;
    box-shadow:
        0 0 20px #ff3366,
        0 0 40px #ff3366,
        0 0 60px #ff3366;
}

.heart::before,
.heart::after{
    content:"";
    position:absolute;
    width:120px;
    height:120px;
    background:#ff3366;
    border-radius:50%;
}

.heart::before{
    top:-60px;
    left:0;
}

.heart::after{
    left:60px;
    top:0;
}

@keyframes heartbeat{
    0%,100%{
        transform:rotate(-45deg) scale(1);
    }
    25%{
        transform:rotate(-45deg) scale(1.1);
    }
    50%{
        transform:rotate(-45deg) scale(1.3);
    }
    75%{
        transform:rotate(-45deg) scale(1.1);
    }
}

.message{
    margin-top:100px;
    color:white;
    text-align:center;
    animation:fadeIn 3s ease;
}

.message h1{
    font-size:3rem;
    text-shadow:0 0 20px #ff66b2;
}

.message p{
    margin-top:10px;
    font-size:1.2rem;
    color:#ffd6e7;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.floating-heart{
    position:absolute;
    color:#ff4d88;
    font-size:20px;
    animation:floatUp linear infinite;
    opacity:.8;
}

@keyframes floatUp{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}

button{
    margin-top:30px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#ff3366;
    color:white;
    cursor:pointer;
    font-size:16px;
    transition:.3s;
}

button:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px #ff3366;
}
</style>
</head>
<body>

<div class="heart"></div>

<div class="message">
    <h1>❤️ Hi Cherelyn ❤️</h1>
    <p>Every heartbeat reminds me of you.
Thank you for making my days happier.</p>
</div>

<button onclick="showMessage()">Click Me 💌</button>

<script>
function showMessage(){
    alert("🌹 Just wanted to say... You're special to me ❤️");
}

function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("floating-heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 15) + "px";
    heart.style.animationDuration = (Math.random() * 5 + 4) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 9000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
